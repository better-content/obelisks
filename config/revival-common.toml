[revival]
	#Ticks before an unaided player bleeds out.
	#Range: 20 ~ 12000
	bleedTicks = 1200
	#Solo-helper ticks required for a full revive.
	#Range: 10 ~ 1200
	reviveTicks = 100
	#Maximum helper and finisher distance in blocks.
	#Range: 1.0 ~ 8.0
	interactionDistance = 3.0
	#Ticks before interrupted revive progress starts decaying.
	#Range: 0 ~ 200
	decayGraceTicks = 20
	#Revive progress lost per unaided tick after the grace period.
	#Range: 0.0 ~ 10.0
	decayPerTick = 0.5
	#Exhaustion charged to each active helper per tick.
	#Range: 0.0 ~ 10.0
	helperExhaustionPerTick = 0.5
	#Downed ticks before give-up input becomes available.
	#Range: 0 ~ 1200
	giveUpUnlockTicks = 100
	#Continuous Sneak-hold ticks required to give up.
	#Range: 20 ~ 1200
	giveUpHoldTicks = 100
	#Health after revival, measured in half-hearts.
	#Range: 1 ~ 40
	revivedHealthHalfHearts = 2
	#Weakness and slowness duration after revival.
	#Range: 0 ~ 1200
	recoveryTicks = 100
	#Ticks between positional downed-player whispers.
	#Range: 20 ~ 1200
	whisperIntervalTicks = 80

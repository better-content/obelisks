#Cluster radius used to associate structures into settlement groups.
#Range: 16 ~ 8192
default_cluster_radius = 134
#Padding (in blocks) applied around structures when generating ring anchors.
#Range: 0 ~ 32
default_ring_padding = 3
#Minimum number of structures required before considering a cluster.
#Range: 1 ~ 64
min_cluster_size = 3
#Whether to include all land-based structures during discovery, or only those with configured depth tags.
scan_all_land_structures = true
#Maximum structures considered each rebuild.
#Range: 1 ~ 2048
max_structures_per_rebuild = 48
#Minimum game ticks between world network rebuilds.
#Range: 1 ~ 20000
min_ticks_between_rebuilds = 40
#How many path/bridge segments to apply per tick.
#Range: 1 ~ 10000
max_segments_placed_per_tick = 64
#Target road width used by the planner model.
#Range: 1 ~ 16
road_width = 3
#Maximum bridge span allowed before requiring support.
#Range: 1 ~ 64
bridge_max_span = 12
#Maximum vertical rise per block step tolerated on bridges.
#Range: 0 ~ 32
bridge_max_bank_grade = 2
#Additional planning cost for bridge blocks.
#Range: 1 ~ 1000
bridge_cost_per_block = 4
#Bridge pier spacing in blocks.
#Range: 1 ~ 128
bridge_pier_spacing = 5
#Terrain sample margin around paths used by route planning.
#Range: 1 ~ 256
route_search_margin = 12
#Cost for each non-direct route step.
#Range: 1 ~ 10000
reroute_step_cost = 10
#Cost penalty for elevation changes per block.
#Range: 0 ~ 10000
slope_cost_per_block = 4
#Maximum depth below terrain top used for bridge support probes.
#Range: 1 ~ 256
max_support_probe_depth = 32
#How deep below surface a structure center can be and still be tracked.
#Range: 0 ~ 256
max_land_structure_depth_below_surface = 8
#A* dry-path search node limit.
#Range: 128 ~ 1000000
max_dry_path_visited_nodes = 4096
#Maximum lateral search distance from the line between endpoints.
#Range: 1 ~ 2048
max_dry_path_distance_from_line = 45
#Allow temporary bridge routing over short spans of water.
allow_water_bridges = false
#Whether wall placement details should be printed. Defaults to false.
print_wall_information = false


version = 3

# Generated by tools/c2me_feature_matrix.py.
# C2ME is required for the finished pack; risky features are re-enabled one
# group at a time and must pass tools/client_join_probe.sh.
defaultGlobalExecutorParallelismExpression = "default"
globalExecutorParallelism = "default"

[generalOptimizations]
	midTickChunkTasksInterval = "default"
	optimizeAsyncChunkRequest = "true"

	[generalOptimizations.autoSave]
		mode = "default"
		delay = "default"

[fixes]
	disableLoggingShutdownHook = "default"
	enforceSafeWorldRandomAccess = "true"

[threadedWorldGen]
	enabled = "true"
	allowThreadedFeatures = "true"
	reduceLockRadius = "true"
	asyncScheduling = "true"

[ioSystem]
	replaceImpl = "default"
	async = "true"
	gcFreeChunkSerializer = "default"
	chunkDataCacheSoftLimit = "default"
	chunkDataCacheLimit = "default"
	chunkStreamVersion = "default"

[noTickViewDistance]
	enabled = "true"
	maxConcurrentChunkLoads = "default"
	compatibilityMode = "default"
	ensureChunkCorrectness = "default"

[clientSideConfig]

	[clientSideConfig.modifyMaxVDConfig]
		enabled = "default"
		maxViewDistance = "default"

[vanillaWorldGenOptimizations]
	optimizeAquifer = false
	useEndBiomeCache = "default"
